<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="genesisGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.8" />
    </radialGradient>
    <filter id="genesisGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background glow -->
  <circle cx="32" cy="32" r="30" fill="url(#genesisGradient)" opacity="0.15" filter="url(#genesisGlow)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <!-- Genesis G symbol -->
  <text x="32" y="38" font-size="32" font-weight="900" fill="#f9cc75" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="2" filter="url(#genesisGlow)">
    G
  </text>
  <!-- Cyan accent dot -->
  <circle cx="32" cy="16" r="2" fill="#22d3ee" filter="url(#genesisGlow)"/>
  <!-- Inner cyan circle -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
</svg>
